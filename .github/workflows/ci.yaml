name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '30 5 * * *'  # 12:30 AM ET (UTC-5) / 1:30 AM ET (UTC-4, EDT)

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install 

      - name: Run tests
        run: npm test
