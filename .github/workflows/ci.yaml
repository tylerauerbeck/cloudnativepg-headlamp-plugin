name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '30 5 * * *'  # 12:30 AM ET (UTC-5) / 1:30 AM ET (UTC-4, EDT)

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install 

      - name: Run tests
        run: npm test
